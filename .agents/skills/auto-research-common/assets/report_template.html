<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<style>
  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --text: #212529;
    --text-secondary: #6c757d;
    --border: #dee2e6;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --accent-hover: #1d4ed8;
    --warn: #d97706;
    --warn-bg: #fffbeb;
    --good: #059669;
    --good-bg: #ecfdf5;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --purple: #7c3aed;
    --purple-bg: #f5f3ff;
    --sidebar-w: 290px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
  }
  .page { display: flex; max-width: 1320px; margin: 0 auto; min-height: 100vh; }
  nav {
    width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--surface);
    border-right: 1px solid var(--border); padding: 20px 0; position: sticky; top: 0;
    height: 100vh; overflow-y: auto;
  }
  nav .brand { padding: 0 20px 16px; font-weight: 700; font-size: 15px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  nav .brand span { color: var(--accent); }
  nav a { display: block; padding: 5px 20px; color: var(--text-secondary); text-decoration: none; font-size: 13px; transition: all .15s; }
  nav a:hover { color: var(--text); background: var(--bg); }
  nav a.sec { font-weight: 600; color: var(--text); padding-top: 14px; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
  nav a.sub { padding-left: 34px; }
  main { padding: 32px 44px 64px; max-width: 1000px; flex: 1; min-width: 0; }
  h1 { font-size: 28px; margin-bottom: 4px; letter-spacing: -.02em; }
  h2 { font-size: 20px; margin: 36px 0 12px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }
  h3 { font-size: 16px; margin: 20px 0 8px; }
  h4 { font-size: 14px; margin: 14px 0 6px; }
  p, li { font-size: 14px; }
  p { margin: 8px 0; }
  ul, ol { padding-left: 22px; margin: 6px 0; }
  li { margin: 3px 0; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-hover); text-decoration: underline; }
  table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
  th, td { padding: 8px 10px; text-align: left; border: 1px solid var(--border); vertical-align: top; }
  th { background: var(--bg); font-weight: 600; white-space: nowrap; }
  tr:hover td { background: #f9fafb; }
  code { font-size: 12px; background: #f1f5f9; padding: 1px 4px; border-radius: 3px; }
  .section-desc { color: var(--text-secondary); font-size: 13px; margin-bottom: 8px; }
  .note-date { color: var(--text-secondary); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 20px; margin: 16px 0; }
  .card.blue { border-left: 3px solid var(--accent); background: var(--accent-light); }
  .card.amber { border-left: 3px solid var(--warn); background: var(--warn-bg); }
  .card.green { border-left: 3px solid var(--good); background: var(--good-bg); }
  .card.red { border-left: 3px solid var(--red); background: var(--red-bg); }
  .card.purple { border-left: 3px solid var(--purple); background: var(--purple-bg); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin: 0 3px 4px 0; background: #f1f5f9; color: #475569; }
  .badge.paper { background: #dbeafe; color: #1e40af; }
  .badge.repo { background: #d1fae5; color: #065f46; }
  .badge.product, .badge.blog { background: #ede9fe; color: #5b21b6; }
  .badge.news, .badge.signal { background: #fef3c7; color: #92400e; }
  .badge.risk, .badge.low { background: #fee2e2; color: #991b1b; }
  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 12px 0; }
  .metric { border: 1px solid var(--border); background: var(--surface); border-radius: 6px; padding: 12px; }
  .metric strong { display: block; font-size: 18px; color: var(--accent); }
  .metric span { color: var(--text-secondary); font-size: 12px; }
  .ref-list li { margin-bottom: 6px; }
  .meta { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
  .meta span { border: 1px solid var(--border); background: var(--surface); border-radius: 999px; padding: 3px 9px; font-size: 12px; color: var(--text-secondary); }
  .trace-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--good); border-radius: 6px; margin: 14px 0; padding: 0; overflow: hidden; }
  .trace-card summary { cursor: pointer; list-style: none; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; font-weight: 700; background: var(--good-bg); }
  .trace-card summary::-webkit-details-marker { display: none; }
  .trace-card summary::before { content: "＋"; color: var(--good); font-weight: 800; margin-right: 4px; }
  .trace-card[open] summary::before { content: "－"; }
  .trace-card p, .trace-card h4, .trace-card ul { margin-left: 18px; margin-right: 18px; }
  .trace-card ul { padding-bottom: 8px; }
  @media (max-width: 900px) {
    .page { display: block; }
    nav { position: relative; width: 100%; min-width: 0; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    main { padding: 24px 18px 48px; }
    .metric-grid { grid-template-columns: 1fr 1fr; }
    th { white-space: normal; }
  }
</style>
</head>
<body>
<div class="page">
<nav>
  <div class="brand">Auto Research <span>调研报告</span></div>
  {{nav}}
</nav>
<main>
{{content}}
<p class="note-date">Generated by auto-research · Template bundled in this repository</p>
</main>
</div>
</body>
</html>
